services:
  node-backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: techstore-node-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - techstore-network
    security_opt:
      - no-new-privileges:true

networks:
  techstore-network:
    driver: bridge

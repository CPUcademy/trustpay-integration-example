services:
  node-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techstore-node-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - techstore-network
    security_opt:
      - no-new-privileges:true

  techstore-frontend:
    image: node:21-alpine
    container_name: techstore-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:3000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    ports:
      - "5174:5174"
    depends_on:
      - node-backend
    networks:
      - techstore-network

networks:
  techstore-network:
    driver: bridge
